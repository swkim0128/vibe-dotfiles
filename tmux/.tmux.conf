# === Prefix 변경 (Ctrl+Space, Ctrl+b도 유지) ===
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# ==========================================
# ✨ Neovim & 바이브 코딩 필수 추가 설정 ✨
# ==========================================
set -sg escape-time 10            # Neovim에서 ESC 누를 때 딜레이 제거
set -g focus-events on            # Neovim 파일 자동 새로고침(Autoread)을 위한 포커스 감지
set -g base-index 1               # 윈도우(탭) 번호를 1부터 시작
setw -g pane-base-index 1         # 패널 번호를 1부터 시작
set -g renumber-windows on        # 중간 탭을 닫으면 번호를 자동으로 다시 매김

# === 기본 설정 ===
set-option -g history-limit 50000
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g automatic-rename off
set -g mouse on
set -g allow-passthrough on
# cmux 워크스페이스 ID 를 attach 시 tmux 세션 환경으로 갱신 — Claude 알림이 stale ID(서버 기동 시점 워크스페이스)로 가는 것 방지
set-option -ga update-environment " CMUX_WORKSPACE_ID CMUX_SURFACE_ID CMUX_TAB_ID CMUX_SOCKET_PATH"
# cmux 탭 제목을 현재 attach된 tmux 세션명으로 표시 — vibe fzf 로 세션 전환 시 클라이언트별 OSC 타이틀로 어느 작업인지 인지
set -g set-titles on
set -g set-titles-string "#S"
# --- Pane Title & Border Settings ---
# 패널 테두리 상단에 상태바(이름표) 표시 활성화
set -g pane-border-status top

# 패널 이름표 포맷 지정 (예: [1] Main Claude)
set -g pane-border-format " [#{pane_index}] #{pane_title} "

set -g pane-border-lines double

# Prefix + T 를 누르면 현재 패널의 이름을 즉시 변경할 수 있는 단축키 설정
bind T command-prompt -p "패널 이름 입력: " "select-pane -T '%%'"

# === 복사 모드 (vi) ===
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# Y: 각 줄 앞 공백 제거 후 복사 (코드블록 들여쓰기 제거용)
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "sed 's/^[[:space:]]*//' | pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# 마우스 스크롤 속도 (기본 3 → 5줄씩)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down

# === 플러그인 ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# yazi 파일 탐색기 (Prefix + Tab: 50% 분할)
bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"

# === Catppuccin 테마 ===
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'

set -g @catppuccin_status_background "#363a4f"
set -g status-style bg=default,fg=white

# 상태 바 왼쪽: 세션 이름
set -g status-left-length 40
set -g status-left "#{E:@catppuccin_status_session}"

# 상태 바 오른쪽: 디렉토리 + Git 브랜치 + CPU + 메모리 + 배터리 + 시간
set -g status-right-length 150
set -g @catppuccin_date_time_text " %m/%d %H:%M"

set -g status-right "#{E:@catppuccin_status_directory}"

set -ag status-right "#[bg=default] #[fg=#a6da95,bg=#363a4f] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') "
set -ag status-right "#[bg=default] #[fg=#8aadf4,bg=#363a4f] #{cpu_percentage} "
set -ag status-right "#[bg=default] #[fg=#eed49f,bg=#363a4f] #{ram_percentage} "
set -ag status-right "#[bg=default] #[fg=#f5bde6,bg=#363a4f] #{battery_icon} #{battery_percentage} "

set -ag status-right "#{E:@catppuccin_status_date_time}"

# 윈도우 탭 (현재 선택 윈도우 강조)
set -g @catppuccin_window_text " #I:#{=10:window_name} "
set -g @catppuccin_window_current_text " #[bold] *#I:#W* "

# === Pane 이동 (Option + hjkl, prefix 없이) ===
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# 한글 IME 활성 시 Option+hjkl 대응 (M-ㅗㅓㅏㅣ)
# ※ macOS 한계: 한글 IME 활성 시 Option(Alt) 모디파이어가 IME에 흡수되어 tmux로
#   Meta로 전달되지 않음 → 아래 M-ㅗ 바인딩은 대부분 트리거되지 않는다.
#   (Ghostty macos-option-as-alt=true 여도 동일. ghostty discussion #10310 참조)
#   → IME 상태에서 확실한 페인 이동은 아래 'Prefix + ㅗㅓㅏㅣ'(IME 무관 동작) 사용.
#   바인딩은 영문/타 터미널 환경 폴백용으로 보존.
bind -n M-ㅗ select-pane -L
bind -n M-ㅓ select-pane -D
bind -n M-ㅏ select-pane -U
bind -n M-ㅣ select-pane -R

# === Pane 이동 (prefix + hjkl / ㅗㅓㅏㅣ) ===
# 한글 IME 활성 상태에서 Ctrl+b 후 한글 키 입력으로 이동
# (Option 설정과 무관하게 항상 동작)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind ㅗ select-pane -L
bind ㅓ select-pane -D
bind ㅏ select-pane -U
bind ㅣ select-pane -R
bind L last-window
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ---------------------------------------------------------
# [명령어 Alias(별명) 설정]
# ---------------------------------------------------------

# 명령어 창에서 'm70'을 치면 패널을 70%로 맞춥니다.
set -sa command-alias 'm70=resize-pane -t 1 -x 70%'
# 명령어 창에서 'm50'을 치면 화면을 정확히 반반으로 나눕니다.
set -sa command-alias 'm50=select-layout even-horizontal'
# (예시) 명령어 창에서 'killall'을 치면 현재 세션의 모든 패널/윈도우를 종료합니다.
set -sa command-alias 'killall=kill-session'

# <Prefix> + M (Shift+m) 을 누르면 화면 중앙에 팝업으로 메뉴 띄우기
bind M display-popup -E -e VIBE_IN_POPUP=1 -w 70% -h 50% -T " My Command Menu " "~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/my-tools.sh"
# <Prefix> + p : para 베이스캠프 세션으로 즉시 이동
bind p run-shell "tmux switch-client -t para 2>/dev/null || tmux new-session -ds para && tmux switch-client -t para"
# <Prefix> + f 를 누르면 팝업창으로 프로젝트 목록을 띄웁니다.
bind f display-popup -E -w 80% -h 60% -T " Project Navigator " "~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/vibe.sh fzf"
# <Prefix> + d : tmux 기본 detach-client 동작으로 복원 (커스텀 바인딩 해제)
# 원격 지시(vibe cast)는 추후 다른 키로 재바인딩 예정
# bind d command-prompt -p "타겟 세션:","지시 메시지:" \
#   "run-shell '~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/vibe.sh cast %1 \"%2\"'"
# <Prefix> + x : 현재 세션 종료 후 para 복귀 (vibe done)
bind x run-shell "~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/vibe.sh done"
# <Prefix> + d : 현재 세션 detach
bind d detach-client

# ---------------------------------------------------------
# [클로드 코드 스킬 메뉴 호출]
# ---------------------------------------------------------
# <Prefix> + C (Shift+c) 를 누르면 클로드 스킬 팝업 호출
bind C display-popup -E -w 70% -h 50% -T " Claude Skills " "~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/claude-skills.sh"

# <Prefix> + ? 치트시트 팝업 (기본 tmux 도움말 덮어씀)
bind ? display-popup -E -w 80% -h 80% -T " Vibe Coding Cheat Sheet " "nvim -R ~/.claude/plugins/marketplaces/swkim0128/claude-config/plugins/tmux-suite/scripts/cheatsheet.md"

# ---------------------------------------------------------
# ✨ [Tmux 세션 자동 저장 및 복구 (Resurrect & Continuum)] ✨
# ---------------------------------------------------------
# Neovim 세션(열려있던 파일들)까지 함께 복구하도록 설정
set -g @resurrect-strategy-nvim 'session'
# 패널 안의 프로그램(클로드 코드 등)도 가능하면 살려내기
set -g @resurrect-processes 'claude nvim npm yazi'
# 컴퓨터를 켜고 Tmux를 처음 실행할 때, 마지막 세션을 자동으로 띄움
set -g @continuum-restore 'on'
# 15분마다 백그라운드에서 자동으로 현재 상태를 저장함 (단위: 분)
set -g @continuum-save-interval '15'

# === TPM 실행 ===
run '~/.tmux/plugins/tpm/tpm'
